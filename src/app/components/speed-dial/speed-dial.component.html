<div class="relative inline-flex">
  <!-- Actions (absolutely stacked so closed state doesn't reserve space) -->
  <div
    class="pointer-events-none absolute flex"
    [class]="actionsGapClass()"
    [class.flex-col-reverse]="direction() === 'up'"
    [class.flex-col]="direction() === 'down'"
    [class.flex-row-reverse]="direction() === 'left'"
    [class.flex-row]="direction() === 'right'"
    [class.items-end]="direction() === 'up' || direction() === 'down'"
    [class.items-center]="direction() === 'left' || direction() === 'right'"
    [class.bottom-full]="direction() === 'up'"
    [class.mb-3]="direction() === 'up'"
    [class.top-full]="direction() === 'down'"
    [class.mt-3]="direction() === 'down'"
    [class.right-full]="direction() === 'left'"
    [class.mr-3]="direction() === 'left'"
    [class.left-full]="direction() === 'right'"
    [class.ml-3]="direction() === 'right'"
    [class.right-0]="direction() === 'up' || direction() === 'down'"
    [class.bottom-0]="direction() === 'left' || direction() === 'right'"
    [attr.aria-hidden]="!open()"
  >
    @for (action of actions(); track action.id ?? action.icon + $index; let i = $index) {
      <div
        class="flex items-center gap-2 transition-all duration-200 ease-out"
        [class]="labelSideClass()"
        [style.transition-delay]="actionDelay(i)"
        [class.opacity-0]="!open()"
        [class.scale-75]="!open()"
        [class.pointer-events-none]="!open()"
        [class.opacity-100]="open()"
        [class.scale-100]="open()"
        [class.pointer-events-auto]="open()"
      >
        @if (showLabels() && action.label) {
          <span
            class="z-10 whitespace-nowrap rounded-md bg-white px-2.5 py-1 text-xs font-medium text-slate-700 shadow-md dark:bg-slate-800 dark:text-slate-200"
          >
            {{ action.label }}
          </span>
        }
        <button
          type="button"
          base-icon-button
          [color]="action.color || 'default'"
          [size]="size()"
          class="!rounded-full shadow-lg shrink-0"
          [disabled]="!!action.disabled"
          [attr.aria-label]="actionAriaLabel(action)"
          (click)="onActionClick(action, $event)"
        >
          <base-icon [name]="action.icon" class="stroke-current" aria-hidden="true"></base-icon>
        </button>
      </div>
    }
  </div>

  <!-- Trigger -->
  <button
    type="button"
    base-icon-button
    [color]="color()"
    [size]="size()"
    class="relative z-10 !rounded-full shadow-lg shrink-0"
    [attr.aria-expanded]="open()"
    [attr.aria-haspopup]="true"
    [attr.aria-label]="triggerAriaLabel()"
    (click)="toggle(); $event.stopPropagation()"
  >
    <base-icon
      [name]="open() ? closeIcon() : openIcon()"
      class="stroke-current transition-transform duration-200"
      [class.rotate-90]="open()"
      aria-hidden="true"
    ></base-icon>
  </button>
</div>
