<div class="flex items-center gap-4 w-full">
  @if (showMinMax()) {
  <span class="text-xs text-slate-500 dark:text-slate-400 min-w-6">{{ min() }}</span>
  }
  <div class="relative flex-1">
    <input type="range"
      [min]="min()" [max]="max()" [step]="step()"
      [disabled]="disabled()"
      [attr.aria-label]="ariaLabel()"
      [attr.aria-valuemin]="min()"
      [attr.aria-valuemax]="max()"
      [attr.aria-valuenow]="value()"
      [ngModel]="value()" (ngModelChange)="onValueChange($event)"
      [class]="trackClasses()"
      class="relative z-10 w-full" />
  </div>
  @if (showMinMax()) {
  <span class="text-xs text-slate-500 dark:text-slate-400 min-w-6">{{ max() }}</span>
  }
  @if (showValue()) {
  <span class="text-sm font-medium text-slate-700 dark:text-slate-300 min-w-8 text-right">{{ getValueLabel() }}</span>
  }
</div>
