<base-card class="mb-8">
        <div class="flex justify-between items-center px-6 py-4 border-b border-slate-100 dark:border-slate-800">
          <h3 class="font-bold text-sm text-slate-900 dark:text-white uppercase tracking-widest">Confirmation</h3>
          <div class="flex gap-2">
            <base-icon name="check-circle" class="w-4 h-4 stroke-green-500"></base-icon>
            <base-icon name="check-circle" class="w-4 h-4 stroke-green-500"></base-icon>
            <base-icon name="check-circle" class="w-4 h-4 stroke-slate-900 dark:stroke-white"></base-icon>
          </div>
        </div>
        <base-card-body class="p-6 flex flex-col flex-1">
          <div class="space-y-3 mb-6">
            <div class="flex justify-between text-xs">
              <span class="!text-[10px] uppercase !font-light !tracking-[2px] text-slate-400">Items</span>
              <span class="font-bold text-slate-900 dark:text-white">2x</span>
            </div>
            <div class="flex justify-between text-sm">
              <span class="font-bold text-slate-900 dark:text-white">Curved Worktable Bamboo</span>
              <span class="font-bold text-slate-900 dark:text-white">$149.00</span>
            </div>
            <div class="flex justify-between text-sm">
              <span class="font-bold text-slate-900 dark:text-white">Wood Desk Chair White</span>
              <span class="font-bold text-slate-900 dark:text-white">$89.00</span>
            </div>
          </div>

          <div class="space-y-4 mb-6 pt-4 border-t border-slate-100 dark:border-slate-800">
            <div class="flex justify-between text-xs items-start">
              <span class="!text-[10px] uppercase !font-light !tracking-[2px] text-slate-400 mt-0.5">Shipping</span>
              <span class="font-bold text-slate-900 dark:text-white">Free</span>
            </div>
            <div class="flex justify-between text-xs items-start">
              <span class="!text-[10px] uppercase !font-light !tracking-[2px] text-slate-400 mt-0.5">Delivery</span>
              <div class="text-right">
                <p class="font-bold text-slate-900 dark:text-white">Design St, 542</p>
                <p class="text-slate-400">New York, NY 10012, USA</p>
              </div>
            </div>
            <div class="flex justify-between text-xs items-start">
              <span class="!text-[10px] uppercase !font-light !tracking-[2px] text-slate-400 mt-0.5">Payment</span>
              <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                  <input type="radio" checked class="w-4 h-4 accent-slate-900">
                  <span class="font-bold text-blue-600 italic">VISA 4521</span>
                </div>
                <div class="flex items-center gap-2 opacity-50">
                  <input type="radio" class="w-4 h-4 accent-slate-900">
                  <span class="text-blue-800 font-bold italic">PayPal</span>
                </div>
              </div>
            </div>
          </div>

          <div class="mt-auto space-y-2 pt-4 border-t border-slate-100 dark:border-slate-800 mb-8">
            <div class="flex justify-between text-xs">
              <span class="text-slate-400">Items</span>
              <span class="font-bold text-slate-900 dark:text-white">$238.00</span>
            </div>
            <div class="flex justify-between text-xs">
              <span class="text-slate-400">Shipping</span>
              <span class="font-bold text-slate-900 dark:text-white">$0</span>
            </div>
            <div class="flex justify-between text-xs">
              <span class="text-slate-400">Promo Code</span>
              <span class="font-bold text-red-500">-$10.00</span>
            </div>
            <div class="flex justify-between text-xl pt-2">
              <span class="font-bold text-slate-900 dark:text-white uppercase tracking-widest text-sm">Total</span>
              <span class="font-bold text-slate-900 dark:text-white">$228.09</span>
            </div>
          </div>

          <div class="mb-6">
            <base-checkbox class="text-xs text-slate-500">I accept the <span
                class="text-slate-900 dark:text-white font-semibold">Terms and Conditions</span></base-checkbox>
          </div>

          <div class="flex flex-col gap-4">
            <button base-button color="primary" class="w-full py-3">Proceed to Checkout</button>
            <button
              class="!text-[10px] uppercase !font-light !tracking-[2px] text-slate-400 hover:text-slate-600 transition-colors w-full text-center py-2">Back</button>
          </div>
        </base-card-body>
      </base-card>
