@if (showMobileOverlay()) {
  <button
    type="button"
    class="fixed inset-0 z-30 bg-slate-900/50 backdrop-blur-[1px] lg:hidden"
    aria-label="Close sidebar"
    (click)="closeMobile()"></button>
}

<aside [class]="sidebarClass()" aria-label="Application sidebar">
  <ng-content select="base-app-shell-sidebar"></ng-content>
</aside>

<div [class]="mainClass()">
  <header [class]="topbarClass()">
    <button
      type="button"
      base-stroked-icon-button
      size="sm"
      color="default"
      class="lg:hidden shrink-0"
      aria-label="Toggle sidebar"
      (click)="toggleSidebar()">
      <base-icon [name]="sidebar.isOpen() ? 'close' : 'menu'" class="w-4 h-4"></base-icon>
    </button>
    <div class="min-w-0 flex-1">
      <ng-content select="base-app-shell-topbar"></ng-content>
    </div>
  </header>

  <div [class]="contentClass()">
    <ng-content select="base-app-shell-content"></ng-content>
  </div>
</div>
