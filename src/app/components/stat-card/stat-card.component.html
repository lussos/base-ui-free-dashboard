<div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-6 flex items-start gap-4">
  @if (icon()) {
    <div [class]="iconBgClasses() + ' w-12 h-12 min-w-12 rounded-xl flex items-center justify-center'">
      <base-icon [name]="icon() || ''" [class]="iconStrokeClasses() + ' w-6 h-6'"></base-icon>
    </div>
  }
  <div class="flex-1 min-w-0">
    <p class="text-sm text-slate-500 dark:text-slate-400 mb-1 truncate">{{ label() }}</p>
    <p class="text-2xl font-bold text-slate-900 dark:text-white mb-2 truncate">{{ value() }}</p>
    @if (trend()) {
      <div class="flex items-center gap-1.5">
        <span [class]="trendUp() ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400'"
              class="flex items-center gap-1 text-xs font-semibold">
          <base-icon [name]="trendUp() ? 'arrow-up' : 'arrow-down'"
                     [class]="(trendUp() ? 'stroke-green-600 dark:stroke-green-400' : 'stroke-red-600 dark:stroke-red-400') + ' w-3 h-3'">
          </base-icon>
          {{ trend() }}
        </span>
        @if (caption()) {
          <span class="text-xs text-slate-400 dark:text-slate-500">{{ caption() }}</span>
        }
      </div>
    }
  </div>
</div>
