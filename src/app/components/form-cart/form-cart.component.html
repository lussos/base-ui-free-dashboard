<base-card class="mb-8">
        <div class="flex justify-between items-center px-6 py-4 border-b border-slate-100 dark:border-slate-800">
          <h3 class="font-bold text-sm text-slate-900 dark:text-white uppercase tracking-widest">Cart</h3>
          <div class="flex -space-x-2">
            <img src="assets/images/avatar1.jpeg"
              class="w-8 h-8 rounded-full border-2 border-white dark:border-slate-900 relative z-20" alt="">
            <img src="assets/images/avatar2.jpeg"
              class="w-8 h-8 rounded-full border-2 border-white dark:border-slate-900 relative z-10" alt="">
          </div>
        </div>
        <base-card-body class="p-6 flex flex-col flex-1">
          <div class="flex items-center gap-4 mb-6">
            <div class="w-12 h-12 rounded-xl overflow-hidden bg-slate-100 dark:bg-slate-800 shrink-0">
              <img src="assets/images/products/backpack.png" alt="" class="w-full h-full object-cover">
            </div>
            <div class="flex-grow">
              <p class="text-sm font-bold text-slate-900 dark:text-white mb-1">Curved Worktable Bamboo</p>
              <div class="flex items-center gap-2">
                <span class="text-[10px] uppercase font-light text-slate-400">Qty: 1</span>
                <div class="flex gap-1">
                  <button
                    class="w-5 h-5 flex items-center justify-center rounded border border-slate-200 text-slate-500 text-xs">-</button>
                  <button
                    class="w-5 h-5 flex items-center justify-center rounded border border-slate-200 text-slate-500 text-xs">+</button>
                </div>
              </div>
            </div>
            <p class="text-sm font-bold text-slate-900 dark:text-white">$149</p>
          </div>

          <div class="flex items-center gap-4 mb-6">
            <div class="w-12 h-12 rounded-xl overflow-hidden bg-slate-100 dark:bg-slate-800 shrink-0">
              <img src="assets/images/products/headphones.png" alt="" class="w-full h-full object-cover">
            </div>
            <div class="flex-grow">
              <p class="text-sm font-bold text-slate-900 dark:text-white mb-1">Wood Desk Chair White</p>
              <div class="flex items-center gap-2">
                <span class="text-[10px] uppercase font-light text-slate-400">Qty: 1</span>
                <div class="flex gap-1">
                  <button
                    class="w-5 h-5 flex items-center justify-center rounded border border-slate-200 text-slate-500 text-xs">-</button>
                  <button
                    class="w-5 h-5 flex items-center justify-center rounded border border-slate-200 text-slate-500 text-xs">+</button>
                </div>
              </div>
            </div>
            <p class="text-sm font-bold text-slate-900 dark:text-white">$89</p>
          </div>

          <div class="mt-auto space-y-2 pt-4 border-t border-slate-100 dark:border-slate-800 mb-6">
            <div class="flex justify-between text-xs">
              <span class="text-slate-400">Subtotal</span>
              <span class="font-bold text-slate-900 dark:text-white">$238.00</span>
            </div>
            <div class="flex justify-between text-xs">
              <span class="text-slate-400">Promo Code</span>
              <span class="font-bold text-red-500">0.00</span>
            </div>
            <div class="flex justify-between text-xs">
              <span class="text-slate-400">Tax</span>
              <span class="font-bold text-slate-900 dark:text-white">$2.49</span>
            </div>
            <div class="flex justify-between text-base pt-2">
              <span class="font-bold text-slate-900 dark:text-white uppercase tracking-widest text-sm">Total</span>
              <span class="font-bold text-slate-900 dark:text-white">$240.49</span>
            </div>
          </div>

          <div class="flex gap-4">
            <button base-stroked-button color="primary" class="flex-1 py-3">Pay with Card</button>
            <button base-button color="primary" class="flex-1 py-3">Checkout</button>
          </div>
        </base-card-body>
      </base-card>
