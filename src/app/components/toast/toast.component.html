@for (group of positionGroups(); track group.position) {
<div [class]="getContainerClasses(group.position)">
  @for (toast of group.items; track toast.id) {
  <div [class]="getToastClasses(toast)" [attr.role]="getToastRole(toast)" aria-live="polite" aria-atomic="true">
    <base-icon [name]="toast.icon" [class]="getIconClasses(toast)" aria-hidden="true"></base-icon>
    <span class="flex-1 text-sm font-medium">{{ toast.message }}</span>
    <button type="button" class="flex items-center justify-center shrink-0" (click)="dismissToast(toast)"
      [attr.aria-label]="'Dismiss notification: ' + toast.message">
      <base-icon name="close" [class]="getCloseClasses()"></base-icon>
    </button>
  </div>
  }
</div>
}
