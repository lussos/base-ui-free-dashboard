<base-card>
  <div class="p-8 flex flex-col gap-6">
    <div>
      <h3 class="font-bold text-sm text-slate-900 dark:text-white mb-1 uppercase tracking-widest">Billing &amp; Plan
      </h3>
      <p class="text-[11px] text-slate-400 uppercase tracking-widest">Choose the right plan for your team</p>
    </div>

    <!-- Plan Cards -->
    <div class="flex overflow-x-auto gap-3 scrollbar-none p-0.5">

      <button type="button" (click)="selectPlan('starter')" [class.ring-2]="selectedPlan() === 'starter'"
        [class.ring-blue-500]="selectedPlan() === 'starter'" [class.bg-blue-50]="selectedPlan() === 'starter'"
        [class.dark:bg-blue-950]="selectedPlan() === 'starter'"
        class="flex flex-col items-start p-5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/50 text-left transition-all hover:border-slate-300 dark:hover:border-slate-600 cursor-pointer min-w-[146px]">
        <div class="w-8 h-8 rounded-lg bg-slate-100 dark:bg-slate-700 flex items-center justify-center mb-3">
          <base-icon name="zap" class="w-4 h-4 stroke-slate-500 dark:stroke-slate-400"></base-icon>
        </div>
        <p class="text-xs font-semibold text-slate-800 dark:text-slate-100 mb-1">Starter</p>
        <p class="text-xl font-bold text-slate-900 dark:text-white leading-none mb-1">$9<span
            class="text-[11px] font-normal text-slate-400">/mo</span></p>
        <p class="text-[10px] text-slate-400 uppercase tracking-wider">Up to 5 seats</p>
      </button>

      <button type="button" (click)="selectPlan('pro')" [class.ring-2]="selectedPlan() === 'pro'"
        [class.ring-blue-500]="selectedPlan() === 'pro'" [class.bg-blue-50]="selectedPlan() === 'pro'"
        [class.dark:bg-blue-950]="selectedPlan() === 'pro'"
        class="flex flex-col items-start p-5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/50 text-left transition-all hover:border-slate-300 dark:hover:border-slate-600 cursor-pointer relative min-w-[146px]">
        <div class="absolute top-3 right-3">
          <base-badge color="primary" size="sm" shape="rectangular">Popular</base-badge>
        </div>
        <div class="w-8 h-8 rounded-lg bg-blue-100 dark:bg-blue-900/50 flex items-center justify-center mb-3">
          <base-icon name="star" class="w-4 h-4 stroke-blue-600 dark:stroke-blue-400"></base-icon>
        </div>
        <p class="text-xs font-semibold text-slate-800 dark:text-slate-100 mb-1">Pro</p>
        <p class="text-xl font-bold text-slate-900 dark:text-white leading-none mb-1">$29<span
            class="text-[11px] font-normal text-slate-400">/mo</span></p>
        <p class="text-[10px] text-slate-400 uppercase tracking-wider">Up to 25 seats</p>
      </button>

      <button type="button" (click)="selectPlan('enterprise')" [class.ring-2]="selectedPlan() === 'enterprise'"
        [class.ring-blue-500]="selectedPlan() === 'enterprise'"
        [class.bg-blue-50]="selectedPlan() === 'enterprise'"
        [class.dark:bg-blue-950]="selectedPlan() === 'enterprise'"
        class="flex flex-col items-start p-5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/50 text-left transition-all hover:border-slate-300 dark:hover:border-slate-600 cursor-pointer min-w-[146px]">
        <div class="w-8 h-8 rounded-lg bg-slate-100 dark:bg-slate-700 flex items-center justify-center mb-3">
          <base-icon name="code" class="w-4 h-4 stroke-slate-500 dark:stroke-slate-400"></base-icon>
        </div>
        <p class="text-xs font-semibold text-slate-800 dark:text-slate-100 mb-1">Enterprise</p>
        <p class="text-xl font-bold text-slate-900 dark:text-white leading-none mb-1">$99<span
            class="text-[11px] font-normal text-slate-400">/mo</span></p>
        <p class="text-[10px] text-slate-400 uppercase tracking-wider">Unlimited seats</p>
      </button>

    </div>

    <!-- Seat Stepper -->
    <div
      class="flex items-center justify-between py-4 px-5 rounded-xl bg-slate-50 dark:bg-slate-800/50 border border-slate-100 dark:border-slate-700/50">
      <div>
        <p class="text-xs font-medium text-slate-700 dark:text-slate-200">Number of seats</p>
        <p class="text-[10px] text-slate-400 uppercase tracking-wider mt-0.5">${{ seats() * 29 }}/mo total</p>
      </div>
      <div class="flex items-center gap-0 border border-slate-200 dark:border-slate-600 rounded-lg overflow-hidden">
        <button type="button" (click)="decrement()" [disabled]="seats() <= 1"
          class="w-9 h-9 flex items-center justify-center bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors disabled:opacity-40 disabled:cursor-not-allowed border-r border-slate-200 dark:border-slate-600">
          <base-icon name="minus" class="w-3.5 h-3.5 stroke-slate-500"></base-icon>
        </button>
        <span
          class="w-12 text-center text-[13px] font-semibold text-slate-900 dark:text-white bg-white dark:bg-slate-800">{{
          seats() }}</span>
        <button type="button" (click)="increment()" [disabled]="seats() >= 100"
          class="w-9 h-9 flex items-center justify-center bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors disabled:opacity-40 disabled:cursor-not-allowed border-l border-slate-200 dark:border-slate-600">
          <base-icon name="plus" class="w-3.5 h-3.5 stroke-slate-500"></base-icon>
        </button>
      </div>
    </div>

    <!-- Promo Code -->
    <div class="flex gap-2.5">
      <base-input-group class="flex-1">
        <base-label class="!text-[10px] uppercase !font-light !tracking-[2px]">Promo Code</base-label>
        <input base-input placeholder="LAUNCH25" class="font-mono uppercase" />
      </base-input-group>
      <div class="flex items-end">
        <button base-button color="secondary" class="h-[42px]">Apply</button>
      </div>
    </div>

    <button base-button color="primary" class="w-full">Upgrade Plan</button>
  </div>
</base-card>
