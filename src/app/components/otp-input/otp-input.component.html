@for (i of boxArray(); track i) {
<input #otpBox [type]="mask() ? 'password' : (numbersOnly() ? 'tel' : 'text')" [value]="digits[i] ?? ''"
  [disabled]="disabled()" [attr.inputmode]="numbersOnly() ? 'numeric' : 'text'" maxlength="1" autocomplete="one-time-code"
  class="not-prose w-12 h-14 text-center text-xl font-bold rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-white dark:focus:!text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-150 disabled:opacity-50 disabled:cursor-not-allowed caret-transparent"
  (input)="onInput($event, i)" (keydown)="onKeydown($event, i)" (paste)="onPaste($event)"
  (focus)="$any($event.target).select()" />
}
