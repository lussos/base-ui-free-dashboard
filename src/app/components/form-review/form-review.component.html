<base-card class="mb-8">
        <div class="flex justify-between items-center px-6 py-4 border-b border-slate-100 dark:border-slate-800">
          <h3 class="font-bold text-sm text-slate-900 dark:text-white">Write a Review</h3>
          <button><base-icon name="x"
              class="w-4 h-4 text-slate-400 hover:text-slate-600 transition-colors"></base-icon></button>
        </div>
        <base-card-body class="p-6 flex flex-col flex-1">
          <div class="flex items-center gap-4 mb-6">
            <div class="w-16 h-16 rounded-xl overflow-hidden bg-slate-100 dark:bg-slate-800 shrink-0">
              <img src="assets/images/products/watch.png" alt="" class="w-full h-full object-cover">
            </div>
            <div>
              <p class="text-sm font-bold text-slate-900 dark:text-white mb-1">G-Shock Premium Edition Watch</p>
              <button class="text-[10px] uppercase font-light text-slate-400 hover:text-slate-600 transition-colors">Add
                a
                Review</button>
            </div>
          </div>
          <div class="mb-6">
            <p class="!text-[10px] uppercase !font-light !tracking-[2px] text-slate-400 mb-2">Post Review</p>
            <base-star-rating>
              <base-star [rating]="4"></base-star>
              <h4 class="!m-0">4</h4>
            </base-star-rating>
          </div>
          <base-input-group class="mb-4">
            <base-label class="!text-[10px] uppercase !font-light !tracking-[2px]">Title</base-label>
            <input base-input placeholder="Title" />
          </base-input-group>
          <base-input-group class="mb-6 flex-1">
            <base-label class="!text-[10px] uppercase !font-light !tracking-[2px]">Review</base-label>
            <textarea base-textarea rows="4" placeholder="Review"></textarea>
          </base-input-group>
          <button base-button color="primary" class="w-full py-3 mt-auto">Write a Review</button>
        </base-card-body>
      </base-card>
