@if (variant() === 'card') {
<div class="space-y-3">
  @for (item of items(); track item) {
  <div class="rounded-xl border border-slate-200 dark:border-slate-700 p-4 space-y-3">
    <div class="flex items-center gap-3">
      <div [class]="'h-8 w-8 rounded-full ' + containerClasses()"></div>
      <div class="flex-1 space-y-2">
        <div class="h-2.5 w-3/4 rounded bg-slate-200 dark:bg-slate-700" [class.animate-pulse]="animated()"></div>
        <div class="h-2 w-1/2 rounded bg-slate-200 dark:bg-slate-700" [class.animate-pulse]="animated()"></div>
      </div>
    </div>
    <div class="h-2 rounded bg-slate-200 dark:bg-slate-700" [class.animate-pulse]="animated()"></div>
    <div class="h-2 w-5/6 rounded bg-slate-200 dark:bg-slate-700" [class.animate-pulse]="animated()"></div>
    <div class="h-2 w-2/3 rounded bg-slate-200 dark:bg-slate-700" [class.animate-pulse]="animated()"></div>
  </div>
  }
</div>
} @else if (variant() === 'table-row') {
<div class="space-y-2">
  @for (item of items(); track item) {
  <div class="flex items-center gap-4">
    <div class="h-8 w-8 rounded-full bg-slate-200 dark:bg-slate-700" [class.animate-pulse]="animated()"></div>
    <div class="flex-1 h-3 rounded bg-slate-200 dark:bg-slate-700" [class.animate-pulse]="animated()"></div>
    <div class="h-3 w-6 rounded bg-slate-200 dark:bg-slate-700" [class.animate-pulse]="animated()"></div>
  </div>
  }
</div>
} @else {
<div class="space-y-2">
  @for (item of items(); track item) {
  <div [class]="containerClasses()" [style]="customStyle()"></div>
  }
</div>
}
