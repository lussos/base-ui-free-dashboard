@if (showDays()) {
  <div class="flex flex-col items-center">
    <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl w-[72px] h-[72px] flex items-center justify-center shadow-sm">
      <span class="text-3xl font-bold text-slate-900 dark:text-white tabular-nums">{{ pad(time().days) }}</span>
    </div>
    <span class="mt-2 text-xs font-medium text-slate-400 uppercase tracking-wider">{{ daysLabel() }}</span>
  </div>
}

<div class="flex flex-col items-center">
  <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl w-[72px] h-[72px] flex items-center justify-center shadow-sm">
    <span class="text-3xl font-bold text-slate-900 dark:text-white tabular-nums">{{ pad(time().hours) }}</span>
  </div>
  <span class="mt-2 text-xs font-medium text-slate-400 uppercase tracking-wider">{{ hoursLabel() }}</span>
</div>

<div class="flex flex-col items-center">
  <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl w-[72px] h-[72px] flex items-center justify-center shadow-sm">
    <span class="text-3xl font-bold text-slate-900 dark:text-white tabular-nums">{{ pad(time().minutes) }}</span>
  </div>
  <span class="mt-2 text-xs font-medium text-slate-400 uppercase tracking-wider">{{ minutesLabel() }}</span>
</div>

<div class="flex flex-col items-center">
  <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl w-[72px] h-[72px] flex items-center justify-center shadow-sm">
    <span class="text-3xl font-bold text-blue-500 tabular-nums">{{ pad(time().seconds) }}</span>
  </div>
  <span class="mt-2 text-xs font-medium text-slate-400 uppercase tracking-wider">{{ secondsLabel() }}</span>
</div>
