<li>
  <button type="button"
    class="h-9 w-9 flex items-center justify-center border text-sm transition-colors duration-200 -ml-px"
    [class]="active() ? 'border-blue-600 text-white bg-blue-600' : 'border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800'"

    <ng-content></ng-content>
  </button>
</li>
