@for (item of visibleItems(); track item.avatarUrl ?? item.name ?? $index) {
  <div [class]="borderClasses() + ' ' + sizeClasses() + ' overflow-hidden bg-slate-200 dark:bg-slate-700 flex items-center justify-center shrink-0'"
       [title]="item.name || ''">
    @if (item.avatarUrl) {
      <img [src]="item.avatarUrl" [alt]="item.name || ''" class="w-full h-full object-cover" />
    } @else {
      <span class="font-semibold text-slate-600 dark:text-slate-300 leading-none select-none">
        {{ item.initials || (item.name?.charAt(0)?.toUpperCase()) || '?' }}
      </span>
    }
  </div>
}

@if (overflowCount() > 0) {
  <div [class]="borderClasses() + ' ' + sizeClasses() + ' bg-slate-100 dark:bg-slate-700 flex items-center justify-center shrink-0'">
    <span class="font-semibold text-slate-600 dark:text-slate-300 leading-none select-none">+{{ overflowCount() }}</span>
  </div>
}
