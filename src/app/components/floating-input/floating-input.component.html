<div class="relative w-full">
  <input
    [type]="type()"
    placeholder=" "
    [disabled]="isDisabled()"
    [value]="value()"
    (input)="onInput($event)"
    (blur)="onTouched()"
    class="peer block w-full appearance-none rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 pb-2 pt-6 text-sm text-slate-900 dark:text-white focus:border-blue-500 focus:outline-none focus:ring-0 disabled:opacity-50 disabled:cursor-not-allowed"
  />
  <label class="pointer-events-none absolute top-4 left-4 z-10 origin-[0] -translate-y-3 scale-75 transform text-sm text-slate-500 dark:text-slate-400 duration-150 peer-placeholder-shown:translate-y-0 peer-placeholder-shown:scale-100 peer-focus:-translate-y-3 peer-focus:scale-75 peer-focus:text-blue-500">
    {{ label() }}
  </label>
</div>
