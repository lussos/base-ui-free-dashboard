<div class="h-screen overflow-hidden bg-slate-50 dark:bg-slate-950">
  <base-app-shell class="h-full">
    <base-app-shell-sidebar>
      <div class="mb-6 flex items-center gap-3 px-2 sm:mb-8">
        <span class="flex h-9 w-9 shrink-0 items-center justify-center rounded-xl bg-blue-500 text-white">
          <base-icon name="layout-grid" class="w-4 h-4 stroke-white"></base-icon>
        </span>
        <div class="min-w-0">
          <p class="truncate text-sm font-semibold text-slate-900 dark:text-white">Base UI</p>
          <p class="text-[10px] uppercase tracking-[0.18em] text-slate-400">Dashboard</p>
        </div>
      </div>

      <!-- Need a nested, multi-level sidebar or a Mega Menu? See the Pro mega-menu and tree components. -->
      <nav class="space-y-5" aria-label="Main navigation">
        <div>
          <p class="mb-1 px-2 text-[10px] font-medium uppercase tracking-widest text-slate-400">App</p>
          <base-nav-list ariaLabel="App pages">
            @for (item of appNav; track item.path) {
              <a
                base-list-item
                [routerLink]="item.path"
                routerLinkActive="!text-blue-500"
                class="gap-3 rounded-lg px-2">
                <span class="flex min-w-0 items-center gap-3">
                  <base-icon [name]="item.icon" class="w-4 h-4 shrink-0"></base-icon>
                  <span class="truncate">{{ item.label }}</span>
                </span>
                @if (item.badge) {
                  <base-badge color="primary" size="sm" shape="rectangular">{{ item.badge }}</base-badge>
                }
              </a>
            }
          </base-nav-list>
        </div>

        <div>
          <p class="mb-1 px-2 text-[10px] font-medium uppercase tracking-widest text-slate-400">
            Component gallery
          </p>
          <base-nav-list ariaLabel="Component gallery">
            @for (item of uiNav; track item.path) {
              <a
                base-list-item
                [routerLink]="item.path"
                routerLinkActive="!text-blue-500"
                class="gap-3 rounded-lg px-2">
                <span class="flex min-w-0 items-center gap-3">
                  <base-icon [name]="item.icon" class="w-4 h-4 shrink-0"></base-icon>
                  <span class="truncate">{{ item.label }}</span>
                </span>
              </a>
            }
          </base-nav-list>
        </div>
      </nav>
    </base-app-shell-sidebar>

    <base-app-shell-topbar>
      <div class="flex items-center justify-between gap-2">
        <div class="min-w-0 flex-1">
          <p class="hidden text-[10px] uppercase tracking-[0.2em] text-slate-400 sm:block">Overview</p>
          <h1 class="truncate text-base font-semibold text-slate-900 sm:text-xl dark:text-white">
            {{ pageTitle() }}
          </h1>
        </div>

        <div class="flex shrink-0 items-center gap-1.5 sm:gap-3">
          <button
            type="button"
            base-stroked-icon-button
            size="sm"
            color="default"
            class="hidden lg:inline-flex"
            aria-label="Collapse sidebar"
            (click)="sidebar.toggle()">
            <base-icon name="layout-sidebar" class="w-4 h-4"></base-icon>
          </button>

          <base-input-group class="hidden md:flex w-44 lg:w-56">
            <base-icon base-addon-start name="search" class="w-4 h-4 stroke-slate-400"></base-icon>
            <input base-input type="search" placeholder="Search…" aria-label="Search" />
          </base-input-group>

          <a
            [href]="githubRepoUrl"
            target="_blank"
            rel="noopener noreferrer"
            class="inline-flex h-7 items-center gap-1.5 rounded-lg border border-slate-300 px-2 text-xs font-medium text-slate-700 transition-colors hover:border-slate-400 hover:bg-slate-50 dark:border-slate-600 dark:text-slate-200 dark:hover:border-slate-500 dark:hover:bg-slate-800 sm:px-2.5"
            aria-label="View source on GitHub">
            <base-icon name="github" class="h-3.5 w-3.5 shrink-0"></base-icon>
            <span class="hidden sm:inline">GitHub</span>
            <base-icon name="external-link" class="hidden h-3 w-3 shrink-0 opacity-50 sm:inline"></base-icon>
          </a>

          <button
            type="button"
            base-stroked-icon-button
            size="sm"
            color="default"
            aria-label="Toggle theme"
            (click)="theme.toggleTheme()">
            <base-icon [name]="theme.isDarkMode() ? 'light' : 'dark'" class="w-4 h-4"></base-icon>
          </button>

          <base-dropdown-menu #userMenu>
            <base-dropdown-menu-item routerLink="/app/settings">
              <base-icon name="settings" class="w-4 h-4 mr-2"></base-icon>
              Settings
            </base-dropdown-menu-item>
            <base-dropdown-menu-item (click)="logout()">
              <base-icon name="arrow-out" class="w-4 h-4 mr-2"></base-icon>
              Logout
            </base-dropdown-menu-item>
          </base-dropdown-menu>

          <button
            type="button"
            class="flex items-center gap-2 rounded-full border border-slate-200 p-0.5 transition-colors hover:bg-slate-50 sm:py-1 sm:pl-1 sm:pr-2.5 dark:border-slate-700 dark:hover:bg-slate-800"
            [base-dropdown-menu-trigger]="userMenu"
            placement="end"
            aria-label="Open user menu">
            <base-avatar
              size="sm"
              shape="circle"
              [initials]="auth.user()?.initials || 'DU'"
              status="active"></base-avatar>
            <span class="hidden max-w-28 truncate text-sm font-medium text-slate-700 lg:inline dark:text-slate-200">
              {{ auth.user()?.name || 'Demo User' }}
            </span>
            <base-icon name="chevron-down" class="hidden w-4 h-4 stroke-slate-400 sm:inline"></base-icon>
          </button>
        </div>
      </div>
    </base-app-shell-topbar>

    <base-app-shell-content class="bg-slate-50 dark:bg-slate-950">
      <router-outlet />
    </base-app-shell-content>
  </base-app-shell>
</div>
