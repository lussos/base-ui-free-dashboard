<base-card>
  <form class="p-8 flex flex-col" (ngSubmit)="submit()">
    <h2 class="font-bold text-sm text-slate-900 dark:text-white mb-2 uppercase tracking-widest text-center">
      Forgot Password
    </h2>
    <p class="text-center text-xs text-slate-400 mb-6">
      Enter your email and we'll send you a reset link.
    </p>

    @if (sent()) {
      <div
        class="mb-6 rounded-lg border border-green-200 bg-green-50 px-4 py-3 text-sm text-green-700 dark:border-green-900 dark:bg-green-950/40 dark:text-green-300">
        If an account exists for {{ email }}, a reset link is on its way.
      </div>
    }

    <base-input-group class="mb-6">
      <base-label class="!text-[10px] uppercase !font-light !tracking-[2px]">Email address</base-label>
      <input base-input name="email" type="email" [(ngModel)]="email" placeholder="Email address" required />
    </base-input-group>

    <button base-button color="primary" type="submit" class="w-full py-3 mb-6">Send Reset Link</button>

    <p class="text-center text-[10px] uppercase font-light text-slate-400 tracking-widest">
      <a routerLink="/login" class="text-slate-900 dark:text-white">Back to login</a>
    </p>
  </form>
</base-card>
